common:
    lid_topic:  "/velodyne_points"
    imu_topic:  "/kitti/oxts/imu"
    time_sync_en: false
    lidar_time_offset: 0.0

preprocess:
    lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    scan_line: 64                # KITTI: HDL-64
    scan_rate: 10
    timestamp_unit: 2
    Horizon_SCAN: 1800
    blind: 2
    point_filter_num: 4

mapping:
    down_sample_size: 0.5
    max_iteration: 3
    voxel_size: 2.0
    max_layer: 3
    layer_point_size: [ 5, 5, 5, 5, 5 ]
    plannar_threshold: 0.01
    max_points_size: 1000
    max_cov_points_size: 1000

    fov_degree:    360
    det_range:     150.0
    extrinsic_est_en:  false
    # KITTI: IMU→LiDAR extrinsic (approx, from calib_imu_to_velo.txt)
    extrinsic_T: [ -0.81, -0.32, 0.80 ]
    extrinsic_R: [  9.999976e-01, 7.553071e-04, -2.035826e-03,
                   -7.854027e-04, 9.998898e-01, -1.482298e-02,
                    2.024406e-03, 1.482454e-02,  9.998881e-01 ]

noise_model:
    ranging_cov: 0.04
    angle_cov: 0.1
    acc_cov: 0.1
    gyr_cov: 0.01
    b_acc_cov: 1.0e-04
    b_gyr_cov: 1.0e-05


publish:
    pub_voxel_map: false
    publish_max_voxel_layer: 1
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: true

pcd_save:
    pcd_save_en: false
    interval: -1

log:
    enable: true

normal:
    project_name: log_lio
    compute_table: false
    ring_table_dir: "/config/kitti"
    compute_normal: true
    check_normal: true

cov_scale:
    roughness_cov_scale: 0.005
    incident_cov_max: 0.005
    incident_cov_scale: 0.5
    visual_ray_scale: 0.05
    visual_tan_scale: 1.0
    visual_a_scale: 0.5

cov_incremental:
    lambda_cov_threshold: 0.001
    normal_cov_threshold: 0.001
    normal_cov_incre_min: 200
    normal_cov_update_interval: 100
    num_update_thread: 4
