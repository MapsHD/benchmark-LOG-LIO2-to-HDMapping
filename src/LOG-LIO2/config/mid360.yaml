common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    time_sync_en: false
    lidar_time_offset: 0.0

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    scan_line: 4                 # MID-360 has 4-line equivalent
    scan_rate: 10
    timestamp_unit: 3            # Livox CustomMsg nanoseconds
    Horizon_SCAN: 1800
    blind: 0.5
    point_filter_num: 3

mapping:
    down_sample_size: 0.2
    max_iteration: 3
    voxel_size: 0.8
    max_layer: 3
    layer_point_size: [ 5, 5, 5, 5, 5 ]
    plannar_threshold: 0.01
    max_points_size: 1000
    max_cov_points_size: 1000

    fov_degree:    360
    det_range:     70.0
    extrinsic_est_en:  false
    # MID-360: IMU and LiDAR are rigidly coupled; factory extrinsic is near-zero.
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

noise_model:
    ranging_cov: 0.04
    angle_cov: 0.1
    acc_cov: 0.1
    gyr_cov: 0.01
    b_acc_cov: 1.0e-04
    b_gyr_cov: 1.0e-05


publish:
    pub_voxel_map: false
    publish_max_voxel_layer: 1
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: true

pcd_save:
    pcd_save_en: false
    interval: -1

log:
    enable: true

normal:
    project_name: log_lio
    compute_table: false
    ring_table_dir: "/config/mid360"
    compute_normal: true
    check_normal: true

cov_scale:
    roughness_cov_scale: 0.005
    incident_cov_max: 0.005
    incident_cov_scale: 0.5
    visual_ray_scale: 0.05
    visual_tan_scale: 1.0
    visual_a_scale: 0.5

cov_incremental:
    lambda_cov_threshold: 0.001
    normal_cov_threshold: 0.001
    normal_cov_incre_min: 200
    normal_cov_update_interval: 100
    num_update_thread: 4
